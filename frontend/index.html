<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light border-bottom mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CRM View</a>
    </div>
  </nav>

    <div class="container">

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Registros de clientes</h4>
      <button class="btn btn-primary" onclick="openModal()">Nuevo registro</button>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Telefono</th>
          <th>Mensaje</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="6" class="text-center">Cargando...</td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- Modal -->
  <div class="modal fade" id="crmModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Nuevo registro</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="entryId" />
          <div class="mb-3">
            <label class="form-label">Nombre del cliente</label>
            <input type="text" id="customerName" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Telefono</label>
            <input type="tel" id="phone" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Mensaje</label>
            <textarea id="message" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
